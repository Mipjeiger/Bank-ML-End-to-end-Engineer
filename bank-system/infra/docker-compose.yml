services:
    # Backend API
    backend:
        build: ../backend
        container_name: bank-backend
        ports:
            - "8000:8000"
        environment:
            - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
            - REDIS_URL=redis://${REDIS_HOST}:${REDIS_PORT}
        depends_on:
            - postgresql
            - redis
        networks:
            - bank-network
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
            interval: 10s
            timeout: 5s
            retries: 3

    # Frontend
    frontend:
        build: ../frontend
        container_name: bank-frontend
        ports:
            - "3002:3000"
        environment:
            - REACT_APP_API_URL=http://backend:8000
        depends_on:
            - backend
        networks:
            - bank-network

    # PostgreSQL Database
    postgresql:
        image: postgres:15-alpine
        container_name: bank-postgresql
        environment:
            - POSTGRES_USER=${DB_USER}
            - POSTGRES_PASSWORD=${DB_PASSWORD}
            - POSTGRES_DB=${DB_NAME}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - bank-network
        healthcheck:
            test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Redis Cache
    redis:
        image: redis:7-alpine
        container_name: bank-redis
        ports:
            - "6379:6379"
        networks:
            - bank-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Prometheus
    prometheus:
        image: prom/prometheus:latest
        container_name: bank-prometheus
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
            - prometheus_data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
        networks:
            - bank-network
        depends_on:
            - backend

    # Grafana
    grafana:
        image: grafana/grafana:latest
        container_name: bank-grafana
        ports:
            - "3000:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
            - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
            - GF_USERS_ALLOW_SIGN_UP=false
        volumes:
            - grafana_data:/var/lib/grafana
        networks:
            - bank-network
        depends_on:
            - prometheus

    # Airflow
    airflow:
        image: apache/airflow:2.7.0-python3.11
        container_name: bank-airflow
        ports:
            - "8080:8080"
        environment:
            - AIRFLOW__CORE__DAGS__FOLDER=/opt/airflow/dags
            - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgresql:5432/${DB_NAME}
            - AIRFLOW__CORE__LOAD_EXAMPLES=False
        volumes:
            - ../airflow/dags:/opt/airflow/dags
            - airflow_logs:/opt/airflow/logs
            - airflow_plugins:/opt/airflow/plugins
        networks:
            - bank-network
        depends_on:
            - postgresql
        command: airflow standalone

networks:
    bank-network:
        driver: bridge

volumes:
    postgres_data:
    redis_data:
    prometheus_data:
    grafana_data:
    airflow_logs:
    airflow_plugins: