global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'bank-system-monitor'

scrape_configs:
  - job_name: 'bank-system'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'drift-monitoring'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    metric_relabel+_configs:
      - source_labels: [__name__]
        regex: 'data_drift_score|request_total'
        action: keep