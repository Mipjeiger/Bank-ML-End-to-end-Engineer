# PIPELINE DEFINITION
# Name: data-pipeline
components:
  comp-load-data:
    executorLabel: exec-load-data
    inputDefinitions:
      parameters:
        data_path:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-load-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - load_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef load_data(data_path: str) -> str:\n    import pandas as pd\n\
          \    df = pd.read_csv(data_path)\n    print(f\"\u2713 Loaded: {df.shape}\"\
          )\n    output_path = '/tmp/merged_data.csv.gz'\n    df.to_csv(output_path,\
          \ index=False, compression='gzip')\n    return output_path\n\n"
        image: python:3.11
pipelineInfo:
  name: data-pipeline
root:
  dag:
    tasks:
      load-data:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-load-data
        inputs:
          parameters:
            data_path:
              runtimeValue:
                constant: ../../Database/data/eda_banking.csv.gz
        taskInfo:
          name: load-data
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
