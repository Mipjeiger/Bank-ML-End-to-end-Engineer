apiVersion: machinelearning.seldon.io/v1
kind: SeldonDeployment
metadata:
  name: banking-llm
spec:
  predictors:
    - name: default
      replicas: 1
      graph:
        name: banking-llm
        children: []
      componentSpecs:
        - spec:
            containers:
              - name: banking-llm
                image: mipjeiger/banking-llm:latest
                imagePullPolicy: Always