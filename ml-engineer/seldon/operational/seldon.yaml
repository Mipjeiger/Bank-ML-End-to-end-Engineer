apiVersion: machinelearning.seldon.io/v1
kind: SeldonDeployment
metadata:
  name: operational-model
spec:
  predictors:
    - name: default
      replicas: 1
      graph:
        name: operational-model
        children: []
      componentSpecs:
        - spec:
            containers:
              - name: operational-model
                image: mipjeiger/operational-model:latest
                imagePullPolicy: IfNotPresent