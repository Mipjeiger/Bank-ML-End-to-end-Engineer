apiVersion: mlops.seldon.io/v1alpha1
kind: Server
metadata:
  name: sklearn-server
  namespace: seldon-system
spec:
  replicas: 1
  containers:
  - name: sklearn
    image: seldonio/mlserver:1.5.0
    ports:
    - containerPort: 8080
      name: http
    env:
      - name: MLSERVER_MODEL_IMPLEMENTATION
        value: mlserver_sklearn.SKLearnModel

      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: minio-credentials
            key: AWS_ACCESS_KEY_ID
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-credentials
            key: AWS_SECRET_ACCESS_KEY
      - name: AWS_ENDPOINT_URL
        valueFrom:
          secretKeyRef:
            name: minio-credentials
            key: AWS_ENDPOINT_URL

  # ── health probes so k8s knows when the server is ready ──
    livenessProbe:
      httpGet:
        path: /v2/health/live
        port: 8080
      initialDelaySeconds: 15
      periodSeconds: 20
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /v2/health/ready
        port: 8080
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 3
    # -- resource guadrails --
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

---
apiVersion: mlops.seldon.io/v1alpha1
kind: Server
metadata:
  name: xgboost-server
  namespace: seldon-system
spec:
  replicas: 1
  containers:
    - name: xgboost
      image: seldonio/mlserver:1.5.0
      ports:
        - containerPort: 8080
          name: http
      env:
        - name: MLSERVER_MODEL_IMPLEMENTATION
          value: mlserver_xgboost.XGBoostModel
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_ENDPOINT_URL
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: AWS_ENDPOINT_URL
      livenessProbe:
        httpGet:
          path: /v2/health/live
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 20
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v2/health/ready
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 3
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"