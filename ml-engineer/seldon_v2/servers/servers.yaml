apiVersion: mlops.seldon.io/v1alpha1
kind: Server
metadata:
  name: sklearn-server
spec:
  replicas: 1
  containers:
  - name: sklearn
    image: seldonio/mlserver:1.5.0
    env:
    - name: MLSERVER_MODEL_IMPLEMENTATION
      value: mlserver_sklearn.SKLearnModel
---
apiVersion: mlops.seldon.io/v1alpha1
kind: Server
metadata:
  name: xgboost-server
spec:
  replicas: 1
  containers:
  - name: xgboost
    image: seldonio/mlserver:1.5.0
    env:
    - name: MLSERVER_MODEL_IMPLEMENTATION
      value: mlserver_xgboost.XGBoostModel